<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1823">
<title>Claridad</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  /* Paleta pastel oscuro */
  --bg: #1a1823;
  --bg-2: #24212e;
  --bg-3: #2d2a3a;
  --fg: #f2eadf;
  --fg-dim: #a8a3b3;
  --fg-mute: #6e6a7a;

  /* Pasteles (ingreso/egreso/neutral) */
  --mint: #b4e5c5;        /* verde menta → ingresos */
  --mint-soft: rgba(180,229,197,0.15);
  --mint-dim: rgba(180,229,197,0.4);
  --peach: #f5c9b8;       /* durazno → egresos */
  --peach-soft: rgba(245,201,184,0.15);
  --peach-dim: rgba(245,201,184,0.4);
  --butter: #f5dea3;      /* mantequilla → alertas */
  --butter-soft: rgba(245,222,163,0.12);
  --rose: #f2b5c4;        /* rosa → negativo fuerte */
  --rose-soft: rgba(242,181,196,0.12);
  --lavender: #c9b8e8;    /* lavanda → info */
  --lavender-soft: rgba(201,184,232,0.15);
  --sky: #b8d4e8;         /* cielo → neutral */
  --sky-soft: rgba(184,212,232,0.12);

  --card: rgba(255,255,255,0.04);
  --card-hi: rgba(255,255,255,0.08);
  --line: rgba(255,255,255,0.07);
  --font-body: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", system-ui, sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, "Inter Display", "SF Pro Display", system-ui, sans-serif;

  /* legacy */
  --accent: var(--mint);
  --warn: var(--butter);
  --danger: var(--rose);
}
html, body { background: var(--bg); color: var(--fg); font-family: var(--font-body); font-size: 16px; line-height: 1.5; letter-spacing: -0.01em; }
body { min-height: 100vh; overflow-x: hidden; }
a, button { color: inherit; font: inherit; background: none; border: 0; cursor: pointer; }
:focus { outline: none; }
::selection { background: var(--lavender-soft); }

/* Fondo suave con glow */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,184,232,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(180,229,197,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* LOGIN */
.lock { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
.lock-logo { font-family: var(--font-display); font-size: 52px; font-weight: 200; letter-spacing: -0.03em; margin-bottom: 48px; }
.lock-logo span { color: var(--accent); }
.lock-input { width: 100%; max-width: 320px; padding: 16px 20px; border-radius: 100px; background: var(--bg-2); border: 1px solid var(--line); color: var(--fg); font-size: 17px; font-family: var(--font-body); text-align: center; letter-spacing: 0.04em; outline: none; transition: border-color 0.2s; }
.lock-input:focus { border-color: var(--accent); }
.lock-btn { margin-top: 16px; padding: 14px 36px; background: var(--accent); color: #0d0c12; border-radius: 100px; font-weight: 600; font-size: 15px; transition: transform 0.1s; }
.lock-btn:active { transform: scale(0.97); }
.lock-hint { margin-top: 32px; color: var(--fg-mute); font-size: 13px; }
.lock-err { color: var(--danger); margin-top: 16px; font-size: 14px; height: 20px; }

/* MAIN */
.app { max-width: 680px; margin: 0 auto; padding: 40px 24px 120px; }
.app.hidden { display: none; }

/* GREETING */
.greet { padding: 80px 0 60px; }
.greet-sub { color: var(--fg-dim); font-size: 15px; margin-bottom: 24px; font-weight: 400; }
.greet-title { font-family: var(--font-display); font-weight: 200; font-size: clamp(36px, 8vw, 56px); letter-spacing: -0.035em; line-height: 1.05; color: var(--fg); margin-bottom: 32px; }
.greet-title em { font-style: normal; color: var(--accent); font-weight: 300; }
.greet-big { font-family: var(--font-display); font-weight: 200; font-size: clamp(56px, 15vw, 120px); letter-spacing: -0.05em; line-height: 0.9; margin: 24px 0; }
.greet-big.negativo { color: var(--fg); }
.greet-big .sym { color: var(--fg-mute); margin-right: 4px; font-weight: 100; }
.greet-delta { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--card); border-radius: 100px; font-size: 14px; margin-top: 16px; }
.greet-delta.up { color: var(--warn); }
.greet-delta.down { color: var(--accent); }
.chev { opacity: 0.4; font-size: 24px; margin-top: 60px; text-align: center; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

/* SECTIONS */
.section { padding: 80px 0; border-top: 1px solid var(--line); }
.section-label { color: var(--fg-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; font-weight: 600; }
.section-title { font-family: var(--font-display); font-weight: 300; font-size: clamp(28px, 6vw, 40px); letter-spacing: -0.025em; line-height: 1.15; margin-bottom: 40px; color: var(--fg); }
.section-title em { font-style: normal; color: var(--accent); }

/* CATEGORY CARDS */
.cat-list { display: flex; flex-direction: column; gap: 12px; }
.cat-card { background: var(--card); border-radius: 20px; padding: 24px; transition: background 0.2s; cursor: pointer; }
.cat-card:hover { background: var(--card-hi); }
.cat-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; gap: 16px; }
.cat-name { font-size: 17px; font-weight: 500; color: var(--fg); }
.cat-monto { font-family: var(--font-display); font-size: 28px; font-weight: 300; letter-spacing: -0.02em; white-space: nowrap; }
.cat-sub { color: var(--fg-dim); font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
.cat-bar { height: 4px; background: var(--bg-2); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
.cat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 100%); border-radius: 2px; transition: width 0.8s ease-out; }
.cat-bar-fill.warn { background: var(--warn); }
.cat-bar-fill.danger { background: var(--danger); }
.cat-compare { display: flex; justify-content: space-between; color: var(--fg-mute); font-size: 12px; }
.cat-compare .delta.up { color: var(--warn); }
.cat-compare .delta.down { color: var(--accent); }

/* SUBSCRIPTION LIST */
.susc-list { display: flex; flex-direction: column; gap: 1px; background: var(--line); border-radius: 20px; overflow: hidden; }
.susc-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: var(--bg); }
.susc-name { font-size: 15px; }
.susc-monto { font-family: var(--font-display); font-size: 18px; font-weight: 400; letter-spacing: -0.01em; }
.susc-total { margin-top: 16px; padding: 18px 24px; background: var(--card); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
.susc-total-lbl { color: var(--fg-dim); font-size: 14px; }
.susc-total-val { font-family: var(--font-display); font-size: 24px; font-weight: 300; color: var(--warn); }

/* ARRENDATARIOS */
.arr-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.arr-card { background: var(--card); border-radius: 20px; padding: 24px; }
.arr-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.arr-name { font-size: 18px; font-weight: 500; }
.arr-status { font-size: 13px; }
.arr-status.ok { color: var(--accent); }
.arr-status.pending { color: var(--warn); }
.arr-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.arr-dot { width: 14px; height: 14px; border-radius: 4px; background: var(--bg-2); position: relative; }
.arr-dot.paid { background: var(--accent); }
.arr-dot.partial { background: var(--warn); }
.arr-dot.empty { background: var(--bg-2); }
.arr-dot-tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
.arr-dot:hover .arr-dot-tip { opacity: 1; }
.arr-months { display: flex; justify-content: space-between; color: var(--fg-mute); font-size: 11px; margin-top: 6px; }
.arr-totals { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
.arr-total-lbl { color: var(--fg-dim); font-size: 13px; }
.arr-total-val { font-family: var(--font-display); font-weight: 400; font-size: 18px; }

/* LINEA TEMPORAL */
.chart-wrap { background: var(--card); border-radius: 24px; padding: 24px; margin-top: 16px; }
.chart-title { color: var(--fg-dim); font-size: 13px; margin-bottom: 24px; }
.chart-svg { width: 100%; height: 180px; }
.chart-axis { color: var(--fg-mute); font-size: 11px; display: flex; justify-content: space-between; margin-top: 8px; }

/* RECOMENDACIONES */
.reco-list { display: flex; flex-direction: column; gap: 16px; }
.reco-card { background: linear-gradient(135deg, var(--card), var(--card-hi)); border: 1px solid var(--line); border-radius: 24px; padding: 28px; }
.reco-num { font-family: var(--font-display); font-size: 48px; font-weight: 200; color: var(--accent); line-height: 1; margin-bottom: 16px; }
.reco-title { font-size: 19px; font-weight: 500; margin-bottom: 8px; line-height: 1.3; }
.reco-detail { color: var(--fg-dim); font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
.reco-save { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--accent-dim); color: var(--accent); border-radius: 100px; font-size: 13px; font-weight: 500; }
.reco-total { margin-top: 32px; text-align: center; padding: 32px 24px; background: var(--card); border-radius: 24px; }
.reco-total-lbl { color: var(--fg-dim); font-size: 14px; margin-bottom: 8px; }
.reco-total-val { font-family: var(--font-display); font-size: 44px; font-weight: 200; color: var(--accent); letter-spacing: -0.02em; }
.reco-total-sub { color: var(--fg-mute); font-size: 13px; margin-top: 4px; }

/* FOOTER */
.foot { text-align: center; padding: 60px 0 0; color: var(--fg-mute); font-size: 12px; }
.foot a { color: var(--fg-dim); text-decoration: underline; text-decoration-color: var(--fg-mute); }

/* UTILIDADES */
.fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }

/* ALERT */
.alert { padding: 16px 20px; background: var(--butter-soft); border: 1px solid rgba(245,222,163,0.2); border-radius: 16px; margin-bottom: 24px; color: var(--butter); font-size: 14px; }
.alert strong { font-weight: 600; }

/* ===== NUEVA VISTA: GRID MENSUAL ===== */
.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }

.hero { padding: 40px 0 50px; }
.hero-sub { color: var(--fg-dim); font-size: 14px; letter-spacing: 0.02em; margin-bottom: 12px; }
.hero-sub span { color: var(--lavender); }
.hero-title { font-family: var(--font-display); font-weight: 200; font-size: clamp(32px, 6vw, 48px); letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 28px; }
.hero-title em { font-style: normal; color: var(--mint); font-weight: 300; }

.kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
@media (max-width: 640px) { .kpi-row { grid-template-columns: 1fr; } }
.kpi { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 20px 22px; }
.kpi-lbl { color: var(--fg-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; font-weight: 600; }
.kpi-val { font-family: var(--font-display); font-size: 28px; font-weight: 300; letter-spacing: -0.02em; }
.kpi.ingreso .kpi-val { color: var(--mint); }
.kpi.egreso .kpi-val { color: var(--peach); }
.kpi.balance .kpi-val { color: var(--lavender); }
.kpi-sub { color: var(--fg-mute); font-size: 12px; margin-top: 6px; }

.year-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.year-tab { padding: 10px 20px; border-radius: 100px; background: transparent; border: 1px solid var(--line); color: var(--fg-dim); font-size: 14px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
.year-tab:hover { background: var(--card); color: var(--fg); }
.year-tab.active { background: var(--lavender-soft); border-color: var(--lavender); color: var(--lavender); }

/* Grid de meses */
.months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.month-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 22px 22px 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.month-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--mint) var(--ingreso-pct, 50%), var(--peach) var(--ingreso-pct, 50%));
  opacity: 0.6;
}
.month-card:hover { background: var(--card-hi); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
.month-card.current { border-color: var(--lavender-dim, rgba(201,184,232,0.3)); }
.month-card.current::after {
  content: 'actual';
  position: absolute;
  top: 14px; right: 14px;
  background: var(--lavender-soft);
  color: var(--lavender);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 100px; font-weight: 600;
}

.mc-nombre { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: -0.015em; margin-bottom: 14px; text-transform: capitalize; }
.mc-row { display: flex; justify-content: space-between; align-items: baseline; margin: 6px 0; font-size: 14px; }
.mc-row .lbl { color: var(--fg-dim); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.mc-row .lbl .dot { width: 6px; height: 6px; border-radius: 50%; }
.mc-row .lbl .dot.i { background: var(--mint); }
.mc-row .lbl .dot.e { background: var(--peach); }
.mc-row .num { font-family: var(--font-display); font-weight: 400; font-size: 17px; letter-spacing: -0.01em; }
.mc-row.ingreso .num { color: var(--mint); }
.mc-row.egreso .num { color: var(--peach); }
.mc-bal { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.mc-bal .b-lbl { color: var(--fg-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
.mc-bal .b-num { font-family: var(--font-display); font-weight: 500; font-size: 18px; letter-spacing: -0.015em; }
.mc-bal .b-num.pos { color: var(--mint); }
.mc-bal .b-num.neg { color: var(--rose); }
.mc-bar { height: 4px; background: var(--bg-2); border-radius: 2px; margin-top: 14px; overflow: hidden; display: flex; }
.mc-bar .fill-i { background: var(--mint); opacity: 0.7; transition: width 0.6s; }
.mc-bar .fill-e { background: var(--peach); opacity: 0.7; transition: width 0.6s; }

/* Modal/Drawer detalle mes */
.sheet-backdrop { position: fixed; inset: 0; background: rgba(26,24,35,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed;
  top: 0; right: 0;
  width: 100%; max-width: 520px;
  height: 100vh;
  background: var(--bg-2);
  z-index: 510;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.25, 1);
  overflow-y: auto;
  border-left: 1px solid var(--line);
}
.sheet.open { transform: translateX(0); }
.sheet-head { position: sticky; top: 0; background: var(--bg-2); padding: 24px 24px 16px; border-bottom: 1px solid var(--line); z-index: 1; backdrop-filter: blur(8px); }
.sheet-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--fg-dim); cursor: pointer; transition: background 0.2s; }
.sheet-close:hover { background: var(--card-hi); color: var(--fg); }
.sheet-mes-sub { color: var(--fg-dim); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.sheet-mes { font-family: var(--font-display); font-size: 32px; font-weight: 300; letter-spacing: -0.025em; text-transform: capitalize; }
.sheet-body { padding: 24px; }

.sheet-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.sheet-stat { padding: 18px 20px; border-radius: 16px; }
.sheet-stat.ingreso { background: var(--mint-soft); }
.sheet-stat.egreso { background: var(--peach-soft); }
.sheet-stat-lbl { color: var(--fg-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 8px; }
.sheet-stat-val { font-family: var(--font-display); font-size: 24px; font-weight: 400; letter-spacing: -0.02em; }
.sheet-stat.ingreso .sheet-stat-val { color: var(--mint); }
.sheet-stat.egreso .sheet-stat-val { color: var(--peach); }
.sheet-stat-sub { color: var(--fg-mute); font-size: 11px; margin-top: 4px; }

.sheet-balance { background: var(--lavender-soft); border-radius: 16px; padding: 18px 22px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; }
.sheet-balance.neg { background: var(--rose-soft); }
.sheet-balance-lbl { color: var(--fg-dim); font-size: 13px; }
.sheet-balance-val { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -0.02em; color: var(--lavender); }
.sheet-balance.neg .sheet-balance-val { color: var(--rose); }

.section-h { color: var(--fg); font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
.section-h .swatch { width: 10px; height: 10px; border-radius: 3px; }
.section-h .swatch.mint { background: var(--mint); }
.section-h .swatch.peach { background: var(--peach); }

.grupos-list { display: flex; flex-direction: column; gap: 8px; }
.grupo-item { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 14px 16px; border-radius: 14px; background: var(--card); align-items: center; transition: background 0.15s; }
.grupo-item:hover { background: var(--card-hi); }
.grupo-name { font-size: 14px; font-weight: 500; }
.grupo-n { color: var(--fg-mute); font-size: 11px; font-weight: 400; margin-left: 6px; }
.grupo-monto { font-family: var(--font-display); font-size: 16px; font-weight: 400; letter-spacing: -0.01em; white-space: nowrap; }
.grupo-item.ingreso .grupo-monto { color: var(--mint); }
.grupo-item.egreso .grupo-monto { color: var(--peach); }
.grupo-bar { grid-column: 1 / -1; height: 3px; background: var(--bg-3); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.grupo-bar .fill { height: 100%; border-radius: 2px; }
.grupo-bar.mint .fill { background: var(--mint-dim); }
.grupo-bar.peach .fill { background: var(--peach-dim); }

.tx-list { display: flex; flex-direction: column; gap: 1px; background: var(--line); border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
.tx-item { padding: 14px 16px; background: var(--bg-2); display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
.tx-desc { font-size: 13px; line-height: 1.35; word-break: break-word; }
.tx-meta { color: var(--fg-mute); font-size: 11px; margin-top: 4px; }
.tx-meta .tag { display: inline-block; background: var(--bg-3); padding: 2px 8px; border-radius: 100px; margin-right: 6px; }
.tx-monto { font-family: var(--font-display); font-size: 15px; font-weight: 400; color: var(--peach); white-space: nowrap; }

.hidden { display: none !important; }

/* ===== FEED JERÁRQUICO ===== */
.feed-section { margin-bottom: 36px; }
.feed-label { color: var(--fg-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; margin-bottom: 14px; padding-left: 2px; }

/* Tarjeta grande (último mes, segundo) */
.mes-grande {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 28px;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.mes-grande:hover { background: var(--card-hi); transform: translateY(-2px); border-color: rgba(255,255,255,0.12); }
.mes-grande.actual::before {
  content: 'este mes';
  position: absolute; top: 22px; right: 24px;
  background: var(--lavender-soft); color: var(--lavender);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
  padding: 5px 12px; border-radius: 100px; font-weight: 600;
}
.mg-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
.mg-nombre { font-family: var(--font-display); font-size: 28px; font-weight: 300; letter-spacing: -0.025em; text-transform: capitalize; }
.mg-year { color: var(--fg-mute); font-size: 14px; font-weight: 400; margin-left: 8px; }
.mg-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.mg-stat { padding: 14px 16px; border-radius: 14px; }
.mg-stat.ingreso { background: var(--mint-soft); }
.mg-stat.egreso { background: var(--peach-soft); }
.mg-stat-lbl { color: var(--fg-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 6px; }
.mg-stat-val { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: -0.02em; }
.mg-stat.ingreso .mg-stat-val { color: var(--mint); }
.mg-stat.egreso .mg-stat-val { color: var(--peach); }
.mg-bal { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.mg-bal-lbl { color: var(--fg-dim); font-size: 13px; }
.mg-bal-val { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
.mg-bal-val.pos { color: var(--mint); }
.mg-bal-val.neg { color: var(--rose); }

/* Grupo trimestre o bimestre */
.mes-grupo {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: minmax(90px, 1fr) auto auto;
  gap: 20px;
  align-items: center;
}
.mes-grupo:hover { background: var(--card-hi); }
.mgp-nombre { font-size: 16px; font-weight: 500; text-transform: none; }
.mgp-sub { color: var(--fg-mute); font-size: 11px; margin-top: 4px; text-transform: lowercase; letter-spacing: 0.02em; }
.mgp-ing { color: var(--mint); font-family: var(--font-display); font-size: 15px; font-weight: 400; white-space: nowrap; }
.mgp-egr { color: var(--peach); font-family: var(--font-display); font-size: 15px; font-weight: 400; white-space: nowrap; }
.mgp-numbers { display: flex; flex-direction: column; gap: 3px; text-align: right; white-space: nowrap; }
.mgp-numbers .lbl { color: var(--fg-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
.mgp-bal { font-family: var(--font-display); font-size: 17px; font-weight: 500; letter-spacing: -0.015em; white-space: nowrap; }
.mgp-bal.pos { color: var(--mint); }
.mgp-bal.neg { color: var(--rose); }

/* Año colapsable */
.year-group {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: background 0.2s;
}
.year-group.open { background: var(--bg-2); }
.year-head {
  padding: 18px 22px;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 18px;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.year-totals { white-space: nowrap; }
.year-bal { white-space: nowrap; }
.year-head:hover { background: var(--card-hi); }
.year-chev { color: var(--fg-mute); font-size: 14px; transition: transform 0.2s; width: 16px; text-align: center; }
.year-group.open .year-chev { transform: rotate(90deg); }
.year-nombre { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: -0.02em; }
.year-meses { color: var(--fg-mute); font-size: 12px; }
.year-totals { display: flex; flex-direction: column; gap: 2px; text-align: right; font-size: 12px; }
.year-totals .i { color: var(--mint); }
.year-totals .e { color: var(--peach); }
.year-bal { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.015em; }
.year-bal.pos { color: var(--mint); }
.year-bal.neg { color: var(--rose); }
.year-body { display: none; padding: 4px 10px 14px; }
.year-group.open .year-body { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.mini-mes {
  display: grid;
  grid-template-columns: minmax(80px, 1fr) auto auto;
  gap: 18px;
  align-items: center;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.mini-mes:hover { background: var(--card); }
.mm-nombre { font-size: 14px; text-transform: none; }
.mm-nums { font-family: var(--font-display); font-size: 13px; display: flex; gap: 10px; white-space: nowrap; }
.mm-nums .i { color: var(--mint); }
.mm-nums .e { color: var(--peach); }
.mm-bal { font-family: var(--font-display); font-weight: 500; font-size: 14px; letter-spacing: -0.01em; min-width: 70px; text-align: right; white-space: nowrap; }
.mm-bal.pos { color: var(--mint); }
.mm-bal.neg { color: var(--rose); }

.foot-new { text-align: center; padding: 60px 0 20px; color: var(--fg-mute); font-size: 12px; }
.foot-new a { color: var(--fg-dim); text-decoration: underline; text-decoration-color: var(--fg-mute); }
</style>
</head>

// Cifrado
async function deriveKey(pw, salt, iters) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: iters, hash: 'SHA-256' },
    mat,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}
async function decrypt(pw) {
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const key = await deriveKey(pw, b64(ENC.salt), ENC.iters);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(ENC.nonce) }, key, b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

async function tryUnlock() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const data = await decrypt(pw);
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    render(data);
  } catch (e) {
    err.textContent = 'Contraseña incorrecta';
    document.getElementById('pw').value = '';
  }
}

// Formato
const fmtCOP = v => '$' + Math.round(v).toLocaleString('es-CO');
// Redondeado corto para espacios chicos: $58,4M, $1,2MM
const fmtShort = v => {
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (abs >= 1e9) return sign + '$' + (abs/1e9).toFixed(2).replace('.',',').replace(/,?0+$/,'') + 'MM';
  if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(1).replace('.',',').replace(',0','') + 'M';
  if (abs >= 1e3) return sign + '$' + (abs/1e3).toFixed(0) + 'k';
  return sign + '$' + abs.toFixed(0);
};
const MES_NOMBRES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const mesBonito = s => { const [y,m] = s.split('-'); return MES_NOMBRES[+m-1] + ' ' + y; };

// ========= ESTADO =========
let DATA = null;

// ========= RENDER PRINCIPAL =========
function render(D) {
  DATA = D;
  document.getElementById('fecha-build').textContent = new Date().toLocaleDateString('es-CO', {day:'numeric', month:'long', year:'numeric'});

  // Hero: año actual KPIs
  const todos = D.todos_meses.slice().sort();   // asc
  const reciente = todos[todos.length - 1];
  const yearAct = reciente.slice(0, 4);
  document.getElementById('hero-year-sub').textContent = `hoy es ${new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long'})}`;

  const mesesAct = todos.filter(m => m.startsWith(yearAct));
  let ing=0, egr=0;
  mesesAct.forEach(m => { const d = D.meses_detalle[m]; if (d) { ing += d.ingresos; egr += d.egresos; } });
  const bal = ing - egr;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi ingreso">
      <div class="kpi-lbl">Ingresos ${yearAct}</div>
      <div class="kpi-val">${fmtCOP(ing)}</div>
      <div class="kpi-sub">${mesesAct.length} ${mesesAct.length===1?'mes':'meses'} registrados</div>
    </div>
    <div class="kpi egreso">
      <div class="kpi-lbl">Egresos ${yearAct}</div>
      <div class="kpi-val">${fmtCOP(egr)}</div>
      <div class="kpi-sub">gasto + impuestos + nómina</div>
    </div>
    <div class="kpi balance">
      <div class="kpi-lbl">Balance</div>
      <div class="kpi-val" style="color:${bal>=0?'var(--mint)':'var(--rose)'}">${bal>=0?'+':'−'}${fmtCOP(Math.abs(bal))}</div>
      <div class="kpi-sub">${bal>=0?'positivo':'negativo'}</div>
    </div>`;

  // FEED JERÁRQUICO
  const feed = document.getElementById('feed');
  const detallados = todos.slice(-2);                           // últimos 2 meses: detallados
  const restoYearAct = mesesAct.filter(m => !detallados.includes(m));
  const yearsPrevios = [...new Set(todos.filter(m => !m.startsWith(yearAct)).map(m => m.slice(0,4)))].reverse();

  let html = '';

  // 1. Últimos 2 meses (grandes, clickables)
  if (detallados.length) {
    html += `<div class="feed-section">
      <div class="feed-label">Últimos meses</div>
      ${detallados.slice().reverse().map(m => cardMesGrande(m, m === reciente)).join('')}
    </div>`;
  }

  // 2. Resto del año actual agrupado de 3 en 3 (trimestres)
  if (restoYearAct.length) {
    const grupos = agruparTrimestres(restoYearAct);
    html += `<div class="feed-section">
      <div class="feed-label">Trimestres de ${yearAct}</div>
      ${grupos.map(g => cardGrupo(g)).join('')}
    </div>`;
  }

  // 3. Años previos colapsables
  if (yearsPrevios.length) {
    html += `<div class="feed-section">
      <div class="feed-label">Años anteriores</div>
      ${yearsPrevios.map(y => cardAnoCollapse(y)).join('')}
    </div>`;
  }

  feed.innerHTML = html;

  // Listeners
  feed.querySelectorAll('[data-mes]').forEach(el => el.addEventListener('click', () => openSheet(el.dataset.mes)));
  feed.querySelectorAll('[data-grupo]').forEach(el => el.addEventListener('click', () => openSheetGrupo(JSON.parse(el.dataset.grupo))));
  feed.querySelectorAll('.year-head').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });

  // Sheet close
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });
}

function cardMesGrande(m, esReciente) {
  const d = DATA.meses_detalle[m];
  if (!d) return '';
  const [yy, mm] = m.split('-');
  const bal = d.ingresos - d.egresos;
  return `
    <div class="mes-grande ${esReciente?'actual':''}" data-mes="${m}">
      <div class="mg-head">
        <div><span class="mg-nombre">${MES_NOMBRES_LARGO[+mm-1]}</span><span class="mg-year">${yy}</span></div>
      </div>
      <div class="mg-stats">
        <div class="mg-stat ingreso">
          <div class="mg-stat-lbl">Ingresos</div>
          <div class="mg-stat-val">${fmtCOP(d.ingresos)}</div>
        </div>
        <div class="mg-stat egreso">
          <div class="mg-stat-lbl">Egresos</div>
          <div class="mg-stat-val">${fmtCOP(d.egresos)}</div>
        </div>
      </div>
      <div class="mg-bal">
        <span class="mg-bal-lbl">Balance del mes</span>
        <span class="mg-bal-val ${bal>=0?'pos':'neg'}">${bal>=0?'+':'−'}${fmtCOP(Math.abs(bal))}</span>
      </div>
    </div>`;
}

function agruparTrimestres(meses) {
  // Agrupa meses por trimestre calendario. Si un grupo tiene <3 meses, se mantiene así.
  const porTrim = {};
  meses.forEach(m => {
    const [yy, mm] = m.split('-');
    const q = Math.ceil(+mm/3);
    const key = `${yy}-Q${q}`;
    if (!porTrim[key]) porTrim[key] = { yy, q, meses: [] };
    porTrim[key].meses.push(m);
  });
  return Object.values(porTrim).sort((a, b) => (b.yy - a.yy) || (b.q - a.q));
}

function cardGrupo(g) {
  let ing = 0, egr = 0;
  g.meses.forEach(m => { const d = DATA.meses_detalle[m]; if (d) { ing += d.ingresos; egr += d.egresos; } });
  const bal = ing - egr;
  const mesesNames = g.meses.map(m => MES_NOMBRES_LARGO[+m.slice(5,7)-1].slice(0,3)).join(' · ');
  const nombreTrim = `Q${g.q} ${g.yy}`;
  return `
    <div class="mes-grupo" data-grupo='${JSON.stringify({nombre:nombreTrim, meses:g.meses}).replace(/'/g,"&#39;")}'>
      <div>
        <div class="mgp-nombre">${nombreTrim}</div>
        <div class="mgp-sub">${mesesNames}</div>
      </div>
      <div class="mgp-numbers">
        <span class="lbl">Ing · Egr</span>
        <span><span class="mgp-ing">${fmtShort(ing)}</span> <span style="color:var(--fg-mute)">·</span> <span class="mgp-egr">${fmtShort(egr)}</span></span>
      </div>
      <div class="mgp-numbers">
        <span class="lbl">Balance</span>
        <span class="mgp-bal ${bal>=0?'pos':'neg'}">${bal>=0?'+':'−'}${fmtShort(Math.abs(bal))}</span>
      </div>
    </div>`;
}

function cardAnoCollapse(year) {
  const meses = DATA.todos_meses.filter(m => m.startsWith(year)).sort().reverse();
  let ing = 0, egr = 0;
  meses.forEach(m => { const d = DATA.meses_detalle[m]; if (d) { ing += d.ingresos; egr += d.egresos; } });
  const bal = ing - egr;
  const inner = meses.map(m => miniMes(m)).join('');
  return `
    <div class="year-group">
      <div class="year-head">
        <span class="year-chev">▶</span>
        <div>
          <span class="year-nombre">${year}</span>
          <div class="year-meses">${meses.length} meses</div>
        </div>
        <div class="year-totals">
          <span class="i">+${fmtShort(ing)}</span>
          <span class="e">−${fmtShort(egr)}</span>
        </div>
        <div class="year-bal ${bal>=0?'pos':'neg'}">${bal>=0?'+':'−'}${fmtShort(Math.abs(bal))}</div>
      </div>
      <div class="year-body">${inner}</div>
    </div>`;
}

function miniMes(m) {
  const d = DATA.meses_detalle[m];
  if (!d) return '';
  const [yy, mm] = m.split('-');
  const bal = d.ingresos - d.egresos;
  return `
    <div class="mini-mes" data-mes="${m}">
      <div class="mm-nombre">${MES_NOMBRES_LARGO[+mm-1]}</div>
      <div class="mm-nums">
        <span class="i">+${fmtShort(d.ingresos)}</span>
        <span class="e">−${fmtShort(d.egresos)}</span>
      </div>
      <div class="mm-bal ${bal>=0?'pos':'neg'}">${bal>=0?'+':'−'}${fmtShort(Math.abs(bal))}</div>
    </div>`;
}

// Abrir sheet para un grupo (trimestre) con totales agregados
function openSheetGrupo(g) {
  // Suma los meses del grupo
  let ing = 0, egr = 0;
  const gruposI = {}, gruposE = {}, topTx = [];
  g.meses.forEach(m => {
    const d = DATA.meses_detalle[m];
    if (!d) return;
    ing += d.ingresos;
    egr += d.egresos;
    (d.grupos_ingreso||[]).forEach(gi => { gruposI[gi.grupo_gordo] = (gruposI[gi.grupo_gordo]||{total:0,n:0}); gruposI[gi.grupo_gordo].total += gi.total; gruposI[gi.grupo_gordo].n += gi.n; });
    (d.grupos_egreso||[]).forEach(ge => { gruposE[ge.grupo_gordo] = (gruposE[ge.grupo_gordo]||{total:0,n:0}); gruposE[ge.grupo_gordo].total += ge.total; gruposE[ge.grupo_gordo].n += ge.n; });
    topTx.push(...(d.top_tx_egreso||[]));
  });

  const fakeDetalle = {
    ingresos: ing, egresos: egr,
    grupos_ingreso: Object.entries(gruposI).map(([k,v]) => ({grupo_gordo:k, total:v.total, n:v.n})).sort((a,b)=>b.total-a.total),
    grupos_egreso: Object.entries(gruposE).map(([k,v]) => ({grupo_gordo:k, total:v.total, n:v.n})).sort((a,b)=>b.total-a.total),
    top_tx_egreso: topTx.sort((a,b)=>b.monto-a.monto).slice(0, 8),
  };

  renderSheetContent(g.nombre, fakeDetalle);
}

// ========= SHEET (DETALLE MES O GRUPO) =========
function openSheet(mes) {
  const d = DATA.meses_detalle[mes];
  if (!d) return;
  const [yy, mm] = mes.split('-');
  renderSheetContent(MES_NOMBRES_LARGO[+mm-1] + ' ' + yy, d);
}

function renderSheetContent(titulo, d) {
  document.getElementById('sheet-mes').textContent = titulo;
  const bal = d.ingresos - d.egresos;
  const balCls = bal >= 0 ? '' : 'neg';
  const balLbl = bal >= 0 ? 'Ahorraste' : 'Gastaste de más';

  const gruposI = (d.grupos_ingreso || []).filter(g => g.total > 0);
  const gruposE = (d.grupos_egreso || []).filter(g => g.total > 0);
  const maxI = Math.max(...gruposI.map(g => g.total), 1);
  const maxE = Math.max(...gruposE.map(g => g.total), 1);

  const iHtml = gruposI.length === 0 ? '<div style="color:var(--fg-mute);font-size:13px;padding:14px 16px">Sin ingresos</div>' :
    gruposI.map(g => `
      <div class="grupo-item ingreso">
        <div class="grupo-name">${g.grupo_gordo}<span class="grupo-n">${g.n} tx</span></div>
        <div class="grupo-monto">${fmtCOP(g.total)}</div>
        <div class="grupo-bar mint"><div class="fill" style="width:${(g.total/maxI*100).toFixed(0)}%"></div></div>
      </div>`).join('');
  const eHtml = gruposE.length === 0 ? '<div style="color:var(--fg-mute);font-size:13px;padding:14px 16px">Sin egresos</div>' :
    gruposE.map(g => `
      <div class="grupo-item egreso">
        <div class="grupo-name">${g.grupo_gordo}<span class="grupo-n">${g.n} tx</span></div>
        <div class="grupo-monto">${fmtCOP(g.total)}</div>
        <div class="grupo-bar peach"><div class="fill" style="width:${(g.total/maxE*100).toFixed(0)}%"></div></div>
      </div>`).join('');

  const top = d.top_tx_egreso || [];
  const topHtml = top.length === 0 ? '' : `
    <div class="section-h"><span class="swatch peach"></span>Top gastos</div>
    <div class="tx-list">
      ${top.map(t => `
        <div class="tx-item">
          <div>
            <div class="tx-desc">${escapeHtml(prettyDesc(t.descripcion))}</div>
            <div class="tx-meta"><span class="tag">${t.grupo_gordo}</span>${t.fecha}</div>
          </div>
          <div class="tx-monto">${fmtCOP(t.monto)}</div>
        </div>`).join('')}
    </div>`;

  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-summary">
      <div class="sheet-stat ingreso">
        <div class="sheet-stat-lbl">Ingresos</div>
        <div class="sheet-stat-val">${fmtCOP(d.ingresos)}</div>
        <div class="sheet-stat-sub">${(d.grupos_ingreso||[]).reduce((a,g)=>a+g.n,0)} transacciones</div>
      </div>
      <div class="sheet-stat egreso">
        <div class="sheet-stat-lbl">Egresos</div>
        <div class="sheet-stat-val">${fmtCOP(d.egresos)}</div>
        <div class="sheet-stat-sub">${(d.grupos_egreso||[]).reduce((a,g)=>a+g.n,0)} transacciones</div>
      </div>
    </div>
    <div class="sheet-balance ${balCls}">
      <span class="sheet-balance-lbl">${balLbl}</span>
      <span class="sheet-balance-val">${bal>=0?'+':'−'}${fmtCOP(Math.abs(bal))}</span>
    </div>
    <div class="section-h"><span class="swatch mint"></span>De dónde entró el dinero</div>
    <div class="grupos-list">${iHtml}</div>
    <div class="section-h"><span class="swatch peach"></span>En qué salió el dinero</div>
    <div class="grupos-list">${eHtml}</div>
    ${topHtml}
  `;

  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
}

// ========= UTILIDADES =========
const MES_NOMBRES_LARGO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function prettyDesc(s) {
  if (!s) return '';
  let t = s.replace(/\s*\[\*\d+\]\s*a:\d+\s*/g, ' ')
           .replace(/\s*de:[A-ZÑÁÉÍÓÚ ]+\s*/g, ' ')
           .replace(/con tus movimientos Bancolombia:\s*/gi, '')
           .trim();
  if (t.length > 90) t = t.slice(0, 88) + '…';
  return t;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
