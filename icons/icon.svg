<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1823"/>
      <stop offset="100%" stop-color="#2d2a3a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#c9b8e8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9b8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#b4e5c5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b4e5c5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="180" height="180" fill="url(#bg)"/>
  <rect width="180" height="180" fill="url(#glow1)"/>
  <rect width="180" height="180" fill="url(#glow2)"/>
  <text x="50%" y="53%" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="135" font-weight="200" fill="#b4e5c5" opacity="0.35" filter="url(#soft)">i</text>
  <text x="50%" y="53%" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="135" font-weight="200" fill="#b4e5c5">i</text>
</svg>
